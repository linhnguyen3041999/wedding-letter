name: Deploy to GitHub Pages

on:
  push:
    branches: [main]          # Trigger on push to main
  workflow_dispatch:          # Allow manual trigger from Actions tab

# Grant the GITHUB_TOKEN permissions needed for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; cancel in-progress ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Detects repository base path (e.g. /wedding-letter for project pages)
      # and sets outputs.base_path / outputs.base_url used below
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload toàn bộ thư mục gốc (chỉ chứa static files)
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
